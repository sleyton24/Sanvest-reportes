# Sitio nginx para Sanvest BI (demo).
# Instalar como: /etc/nginx/sites-available/sanvest  (+ symlink en sites-enabled)
# Si hay dominio, cambiar server_name y luego correr certbot para HTTPS.

server {
    listen 80;
    server_name _;                      # ej: reportes.sanvest.cl

    # Frontend (build estático de Vite)
    root /opt/sanvest-bi/frontend/dist;
    index index.html;

    # API FastAPI (uvicorn en localhost:8077). El "/" final del proxy_pass
    # QUITA el prefijo /api — igual que el proxy de Vite en dev.
    location /api/ {
        proxy_pass http://127.0.0.1:8077/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_buffering off;            # necesario para el streaming SSE de los agentes
        proxy_read_timeout 300s;        # cargas de informes grandes / agentes
        client_max_body_size 60m;       # los .xlsx crudos pueden pesar >18 MB
    }

    # Logos e imágenes de /public: mismo nombre de archivo al actualizarse, así que
    # se piden con revalidación (no-cache) para que un logo nuevo se vea tras un
    # deploy SIN que el usuario tenga que hacer hard-refresh. (Los bundles JS/CSS
    # llevan hash en el nombre, esos sí se cachean fuerte por defecto.)
    location /logos/ {
        add_header Cache-Control "no-cache";
    }
    location = /sanvest-azul.png  { add_header Cache-Control "no-cache"; }
    location = /sanvest-blanco.png { add_header Cache-Control "no-cache"; }

    # Bundles JS/CSS: llevan hash en el nombre → cache fuerte e inmutable (nunca
    # cambian sin cambiar de nombre). Así el navegador no re-descarga en cada visita.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA: cualquier ruta desconocida vuelve al index. El index.html NO se cachea
    # (no-cache = revalidar siempre) para que tras un deploy el navegador tome el
    # index nuevo —que apunta al bundle con hash nuevo— sin hard-refresh manual.
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
